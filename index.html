<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Python自動工廠：太空射擊彈幕遊戲</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; color: #fff; font-family: system-ui, sans-serif;
        }
        canvas { border: 3px solid #00ffcc; background-color: #0b0b16; box-shadow: 0 0 30px rgba(0,255,204,0.2); }
        .info { margin-bottom: 12px; font-size: 16px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="info">🚀 Python 工廠全功能解鎖：真．動態 HTML5 射擊對戰網頁</div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;

        const player = {
            x: 375, y: 440,
            width: 50, height: 20,
            speed: 7, color: "#00ffcc"
        };

        const bulletConfig = {
            width: 4, height: 15,
            speed: 9, color: "#ff333a"
        };

        const bullets = [];
        const enemies = [
            
            { x: 100, y: 60, width: 60, height: 30, color: "#ff0055", score: 30, alive: true },
            
            { x: 250, y: 60, width: 60, height: 30, color: "#ff0055", score: 30, alive: true },
            
            { x: 400, y: 60, width: 60, height: 30, color: "#ff0055", score: 30, alive: true },
            
            { x: 550, y: 60, width: 60, height: 30, color: "#ff0055", score: 30, alive: true },
            
            { x: 180, y: 120, width: 60, height: 30, color: "#ff9900", score: 10, alive: true },
            
            { x: 330, y: 120, width: 60, height: 30, color: "#ff9900", score: 10, alive: true },
            
            { x: 480, y: 120, width: 60, height: 30, color: "#ff9900", score: 10, alive: true },
            
        ];

        const keys = { Left: false, Right: false, Space: false };
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") keys.Left = true;
            if (e.key === "ArrowRight" || e.key === "d") keys.Right = true;
            if (e.key === " " || e.key === "Spacebar") {
                e.preventDefault();
                if(!keys.Space) { fireBullet(); keys.Space = true; }
            }
        });
        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") keys.Left = false;
            if (e.key === "ArrowRight" || e.key === "d") keys.Right = false;
            if (e.key === " ") keys.Space = false;
        });

        function fireBullet() {
            bullets.push({
                x: player.x + player.width / 2 - bulletConfig.width / 2,
                y: player.y,
                width: bulletConfig.width,
                height: bulletConfig.height,
                speed: bulletConfig.speed
            });
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (keys.Left) player.x -= player.speed;
            if (keys.Right) player.x += player.speed;

            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // 子彈移動與邊界回收
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y + bullets[i].height < 0) {
                    bullets.splice(i, 1);
                    continue;
                }

                // 碰撞偵測機制
                for (let j = 0; j < enemies.length; j++) {
                    let enemy = enemies[j];
                    if (enemy.alive && isColliding(bullets[i], enemy)) {
                        enemy.alive = false;
                        score += enemy.score;
                        bullets.splice(i, 1);
                        break; 
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 畫玩家
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 2. 畫子彈
            ctx.fillStyle = bulletConfig.color;
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            // 3. 畫敵人
            enemies.forEach(enemy => {
                if (enemy.alive) {
                    ctx.fillStyle = enemy.color;
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                }
            });

            // 4. 畫儀表板
            ctx.fillStyle = "#fff"; ctx.font = "16px monospace";
            ctx.fillText("🎮 移動：A / D 或 ◄ ► 鍵", 20, 35);
            ctx.fillText("🚀 射擊：[ 空白鍵 Space ]", 20, 60);
            
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 22px monospace";
            ctx.fillText("🎯 SCORE: " + score, canvas.width - 180, 45);
        }

        function gameLoop() {
            update(); draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
